<script>
        // Handle slider visual fill and value updates
        document.querySelectorAll('.topic-slider').forEach(slider => {
            
            // Initial setup based on default value
            updateSliderStyle(slider);
            
            // Listen for input
            slider.addEventListener('input', (e) => {
                const val = e.target.value;
                const targetId = e.target.getAttribute('data-target');
                
                // Update text displays
                const mobileTarget = document.getElementById(targetId);
                if(mobileTarget) mobileTarget.textContent = val;
                
                const deskTarget = document.getElementById(targetId + '-desk');
                if(deskTarget) deskTarget.textContent = val;
                
                // Update track background
                updateSliderStyle(e.target);
            });
        });

        function updateSliderStyle(slider) {
            const val = slider.value;
            const min = slider.min ? slider.min : 1;
            const max = slider.max ? slider.max : 10;
            const percentage = ((val - min) / (max - min)) * 100;
            
            // Apply linear gradient to simulate filled track
            slider.style.background = `linear-gradient(to right, #2170e4 0%, #2170e4 ${percentage}%, #e1e3e4 ${percentage}%, #e1e3e4 100%)`;
        }

        // Time selection logic
        const timeButtons = document.querySelectorAll('.flex-wrap button');
        timeButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                // Reset all
                timeButtons.forEach(b => {
                    b.className = 'px-4 py-2 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface font-ui-medium text-ui-medium hover:bg-surface-container-low transition-colors duration-200';
                });
                
                // Set active
                e.target.className = 'px-4 py-2 rounded-lg bg-primary text-on-primary font-ui-medium text-ui-medium shadow-sm transition-colors duration-200';
            });
        });
    </script>
