<body class="bg-background min-h-screen flex items-center justify-center font-ui-medium text-on-background antialiased selection:bg-secondary selection:text-on-secondary">
<div class="w-full max-w-2xl px-6 py-12 flex flex-col items-center">
<!-- Progress Stepper -->
<div class="flex items-center w-64 mb-12 relative">
<!-- Line -->
<div class="absolute top-1/2 left-0 w-full h-[2px] bg-outline-variant -translate-y-1/2 z-0"></div>
<!-- Progress Line (Filled) -->
<div class="absolute top-1/2 left-0 w-[0%] h-[2px] bg-[#2563EB] -translate-y-1/2 z-0 transition-all duration-300"></div>
<!-- Dots -->
<div class="flex justify-between w-full z-10">
<div class="w-3 h-3 rounded-full bg-[#2563EB] ring-4 ring-background"></div>
<div class="w-3 h-3 rounded-full bg-outline-variant ring-4 ring-background"></div>
<div class="w-3 h-3 rounded-full bg-outline-variant ring-4 ring-background"></div>
<div class="w-3 h-3 rounded-full bg-outline-variant ring-4 ring-background"></div>
</div>
</div>
<!-- Header -->
<div class="text-center mb-10">
<h1 class="font-h1 text-h1 text-primary mb-2">What are you preparing for?</h1>
<p class="font-subheading text-subheading text-on-surface-variant">Select all domains you want to cover</p>
</div>
<!-- Grid Layout -->
<div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-12 w-full max-w-[540px]">
<!-- Card 1: Selected -->
<div class="domain-card relative group cursor-pointer rounded-lg p-5 flex flex-col items-center justify-center text-center bg-[#EFF6FF] border border-[#2563EB] h-[140px] transition-all hover:shadow-[0_1px_3px_rgba(0,0,0,0.1)]" onclick="toggleDomain(this)">
<span class="material-symbols-outlined absolute top-3 right-3 text-[#2563EB] text-[20px]" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="material-symbols-outlined text-[32px] text-[#2563EB] mb-3">code</span>
<span class="font-card-title text-card-title text-primary">SDE</span>
</div>
<!-- Card 2 -->
<div class="domain-card relative group cursor-pointer rounded-lg p-5 flex flex-col items-center justify-center text-center bg-surface-container-lowest border border-outline-variant h-[140px] transition-all hover:bg-surface-container-low hover:border-outline" onclick="toggleDomain(this)">
<span class="check-icon material-symbols-outlined absolute top-3 right-3 text-transparent text-[20px] transition-colors" data-weight="fill">check_circle</span>
<span class="material-symbols-outlined text-[32px] text-on-surface-variant mb-3 group-hover:text-primary transition-colors">web</span>
<span class="font-card-title text-card-title text-primary">Frontend</span>
</div>
<!-- Card 3 -->
<div class="domain-card relative group cursor-pointer rounded-lg p-5 flex flex-col items-center justify-center text-center bg-surface-container-lowest border border-outline-variant h-[140px] transition-all hover:bg-surface-container-low hover:border-outline" onclick="toggleDomain(this)">
<span class="check-icon material-symbols-outlined absolute top-3 right-3 text-transparent text-[20px] transition-colors" data-weight="fill">check_circle</span>
<span class="material-symbols-outlined text-[32px] text-on-surface-variant mb-3 group-hover:text-primary transition-colors">analytics</span>
<span class="font-card-title text-card-title text-primary">Data Science</span>
</div>
<!-- Card 4 -->
<div class="domain-card relative group cursor-pointer rounded-lg p-5 flex flex-col items-center justify-center text-center bg-surface-container-lowest border border-outline-variant h-[140px] transition-all hover:bg-surface-container-low hover:border-outline" onclick="toggleDomain(this)">
<span class="check-icon material-symbols-outlined absolute top-3 right-3 text-transparent text-[20px] transition-colors" data-weight="fill">check_circle</span>
<span class="material-symbols-outlined text-[32px] text-on-surface-variant mb-3 group-hover:text-primary transition-colors">query_stats</span>
<span class="font-card-title text-card-title text-primary">Data Analyst</span>
</div>
<!-- Card 5 -->
<div class="domain-card relative group cursor-pointer rounded-lg p-5 flex flex-col items-center justify-center text-center bg-surface-container-lowest border border-outline-variant h-[140px] transition-all hover:bg-surface-container-low hover:border-outline" onclick="toggleDomain(this)">
<span class="check-icon material-symbols-outlined absolute top-3 right-3 text-transparent text-[20px] transition-colors" data-weight="fill">check_circle</span>
<span class="material-symbols-outlined text-[32px] text-on-surface-variant mb-3 group-hover:text-primary transition-colors">cloud</span>

</div>
<!-- Card 6 -->

<span class="check-icon material-symbols-outlined absolute top-3 right-3 text-transparent text-[20px] transition-colors" data-weight="fill">check_circle</span>
<span class="material-symbols-outlined text-[32px] text-on-surface-variant mb-3 group-hover:text-primary transition-colors">more_horiz</span>

</div>

<!-- Actions -->
<div class="flex items-center justify-between w-full max-w-[540px] mt-auto">
<button class="text-on-surface-variant hover:text-primary transition-colors font-ui-medium text-ui-medium">Skip for now</button>
<button class="bg-[#111827] text-white px-6 py-2.5 rounded-[6px] font-ui-medium text-ui-medium hover:bg-black transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-[#111827] focus:outline-none">Continue</button>
</div>
</div>
<script>
        function toggleDomain(element) {
            const isSelected = element.classList.contains('bg-[#EFF6FF]');
            
            if (isSelected) {
                // Deselect
                element.classList.remove('bg-[#EFF6FF]', 'border-[#2563EB]');
                element.classList.add('bg-surface-container-lowest', 'border-outline-variant');
                
                const icon = element.querySelector('.material-symbols-outlined');
                icon.classList.remove('text-[#2563EB]');
                icon.classList.add('text-transparent');
                
                const mainIcon = element.querySelectorAll('.material-symbols-outlined')[1];
                mainIcon.classList.remove('text-[#2563EB]');
                mainIcon.classList.add('text-on-surface-variant');
                
            } else {
                // Select
                element.classList.remove('bg-surface-container-lowest', 'border-outline-variant', 'hover:bg-surface-container-low', 'hover:border-outline');
                element.classList.add('bg-[#EFF6FF]', 'border-[#2563EB]');
                
                const icon = element.querySelector('.material-symbols-outlined');
                icon.classList.remove('text-transparent');
                icon.classList.add('text-[#2563EB]');
                icon.style.fontVariationSettings = "'FILL' 1";
                
                const mainIcon = element.querySelectorAll('.material-symbols-outlined')[1];
                mainIcon.classList.remove('text-on-surface-variant');
                mainIcon.classList.add('text-[#2563EB]');
            }
        }
    </script>
