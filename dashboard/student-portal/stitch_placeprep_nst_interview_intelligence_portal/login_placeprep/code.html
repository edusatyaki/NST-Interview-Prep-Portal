<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PlacePrep - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-highest": "#e1e3e4",
                        "on-secondary-container": "#fefcff",
                        "tertiary-fixed": "#ffddb8",
                        "tertiary": "#000000",
                        "on-primary-fixed": "#141b2b",
                        "on-primary-container": "#7d8497",
                        "on-secondary": "#ffffff",
                        "tertiary-container": "#2a1700",
                        "secondary": "#0058be",
                        "surface-container-low": "#f3f4f5",
                        "tertiary-fixed-dim": "#ffb95f",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed-variant": "#004395",
                        "primary-fixed": "#dce2f7",
                        "surface": "#f8f9fa",
                        "on-tertiary-container": "#b87500",
                        "outline-variant": "#c6c6cd",
                        "primary-container": "#141b2b",
                        "inverse-on-surface": "#f0f1f2",
                        "primary": "#000000",
                        "secondary-container": "#2170e4",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#c0c6db",
                        "on-surface-variant": "#45464c",
                        "inverse-surface": "#2e3132",
                        "on-error-container": "#93000a",
                        "outline": "#76777d",
                        "on-surface": "#191c1d",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed-variant": "#653e00",
                        "surface-container": "#edeeef",
                        "on-tertiary-fixed": "#2a1700",
                        "secondary-fixed": "#d8e2ff",
                        "surface-tint": "#575e70",
                        "on-primary": "#ffffff",
                        "surface-dim": "#d9dadb",
                        "inverse-primary": "#c0c6db",
                        "on-secondary-fixed": "#001a42",
                        "on-background": "#191c1d",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "surface-variant": "#e1e3e4",
                        "secondary-fixed-dim": "#adc6ff",
                        "surface-container-high": "#e7e8e9",
                        "surface-bright": "#f8f9fa",
                        "on-primary-fixed-variant": "#404758",
                        "background": "#f8f9fa"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "container_padding": "24px",
                        "sidebar_width": "216px",
                        "gutter": "16px",
                        "right_panel_width": "280px",
                        "navbar_height": "56px"
                    },
                    "fontFamily": {
                        "h1": ["Inter"],
                        "card-title": ["Inter"],
                        "table-header": ["Inter"],
                        "ui-medium": ["Inter"],
                        "body-sm": ["Inter"],
                        "subheading": ["Inter"]
                    },
                    "fontSize": {
                        "h1": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "card-title": ["16px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "table-header": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "ui-medium": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "body-sm": ["12px", { "lineHeight": "18px", "fontWeight": "400" }],
                        "subheading": ["14px", { "lineHeight": "20px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input:focus {
            outline: none;
            box-shadow: 0 0 0 2px #3B82F6;
        }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-container_padding font-sans">
<!-- Login Card Canvas -->
<div class="bg-surface-container-lowest w-full max-w-[400px] rounded-xl border border-outline-variant shadow-sm p-8 flex flex-col items-center">
<!-- Logo Area -->
<div class="mb-6 w-16 h-16 rounded-full bg-secondary-fixed flex items-center justify-center border border-secondary-fixed-dim">
<span class="material-symbols-outlined text-secondary" style="font-size: 32px; font-variation-settings: 'FILL' 1;">shield</span>
</div>
<!-- Headings -->
<div class="text-center mb-8">
<h1 class="font-h1 text-h1 text-on-surface mb-2">Welcome back</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Sign in to your PlacePrep account</p>
</div>
<!-- Form -->
<form class="w-full space-y-4">
<!-- Email Input -->
<div>
<label class="sr-only" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
<input class="w-full h-10 pl-10 pr-3 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface font-body-sm text-body-sm placeholder:text-outline focus:border-transparent transition-shadow" id="email" name="email" placeholder="NST Email (.edu.in)" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div>
<label class="sr-only" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input class="w-full h-10 pl-10 pr-10 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface font-body-sm text-body-sm placeholder:text-outline focus:border-transparent transition-shadow" id="password" name="password" placeholder="Password" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Login Action -->
<button class="w-full h-10 bg-primary text-on-primary rounded-lg font-ui-medium text-ui-medium hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                Sign In
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="w-full flex items-center justify-center my-6 relative">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative bg-surface-container-lowest px-3">
<span class="font-body-sm text-body-sm text-outline">or</span>
</div>
</div>
<!-- SSO Action -->
<button class="w-full h-10 bg-surface-container-lowest border border-outline-variant rounded-lg text-on-surface font-ui-medium text-ui-medium hover:bg-surface-container-low transition-colors flex items-center justify-center gap-3" type="button">
<!-- Simulated Google Logo with Material Icon -->
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1; color: #DB4437;">g_mobiledata</span>
            Sign in with NST Google Account
        </button>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="text-secondary font-ui-medium hover:underline focus:outline-none focus:ring-2 focus:ring-secondary focus:ring-offset-2 rounded-sm" href="#">Register</a>
</p>
</div>
</div>
</body></html>
