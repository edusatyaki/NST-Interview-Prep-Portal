<style>
        body {
            background-color: #F9FAFB;
        }
        .chip-selected {
            background-color: #111827;
            color: #ffffff;
            border-color: #111827;
        }
        .chip-unselected {
            background-color: #ffffff;
            color: #374151;
            border-color: #E5E7EB;
        }
    </style>

<body class="min-h-screen flex items-center justify-center font-ui-medium text-ui-medium text-on-surface">
<div class="w-full max-w-lg px-6 py-12">
<!-- Progress Stepper -->
<div class="flex items-center justify-between mb-12">
<div class="flex items-center">
<div class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-card-title text-card-title">1</div>
<div class="h-0.5 w-12 bg-surface-container-highest mx-2"></div>
<div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-card-title text-card-title">2</div>
<div class="h-0.5 w-12 bg-surface-container-highest mx-2"></div>
<div class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant flex items-center justify-center font-card-title text-card-title">3</div>
</div>
<span class="font-body-sm text-body-sm text-on-surface-variant">Step 2 of 3</span>
</div>
<!-- Heading -->
<h1 class="font-h1 text-h1 text-primary mb-6">Which companies are you targeting?</h1>
<!-- Search Input -->
<div class="relative mb-8">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-outline-variant bg-surface-container-lowest focus:outline-none focus:ring-2 focus:ring-secondary-container transition-shadow text-on-surface font-ui-medium text-ui-medium" placeholder="Search companies..." type="text"/>
</div>
<!-- Chips Container -->
<div class="flex flex-wrap gap-3 mb-6" id="company-chips">
<!-- Selected Chips -->
<button class="chip-selected px-4 py-2 rounded-full border text-sm font-medium transition-colors hover:opacity-90 flex items-center gap-2">
<div class="w-5 h-5 rounded-full bg-white text-black flex items-center justify-center text-[10px] font-bold">G</div>
                Google
            </button>
<button class="chip-selected px-4 py-2 rounded-full border text-sm font-medium transition-colors hover:opacity-90 flex items-center gap-2">
<div class="w-5 h-5 rounded-full bg-white text-black flex items-center justify-center text-[10px] font-bold">A</div>
                Amazon
            </button>
<button class="chip-selected px-4 py-2 rounded-full border text-sm font-medium transition-colors hover:opacity-90 flex items-center gap-2">
<div class="w-5 h-5 rounded-full bg-white text-black flex items-center justify-center text-[10px] font-bold">M</div>
                Microsoft
            </button>
<!-- Unselected Chips -->
<button class="chip-unselected px-4 py-2 rounded-full border text-sm font-medium transition-colors hover:bg-surface-container-low flex items-center gap-2">
<div class="w-5 h-5 rounded-full bg-surface-container-highest flex items-center justify-center text-[10px] font-bold">F</div>
                Flipkart
            </button>
<button class="chip-unselected px-4 py-2 rounded-full border text-sm font-medium transition-colors hover:bg-surface-container-low">TCS</button>
<button class="chip-unselected px-4 py-2 rounded-full border text-sm font-medium transition-colors hover:bg-surface-container-low">Infosys</button>
<button class="chip-unselected px-4 py-2 rounded-full border text-sm font-medium transition-colors hover:bg-surface-container-low">Razorpay</button>
<button class="chip-unselected px-4 py-2 rounded-full border text-sm font-medium transition-colors hover:bg-surface-container-low">Swiggy</button>
<button class="chip-unselected px-4 py-2 rounded-full border text-sm font-medium transition-colors hover:bg-surface-container-low">Paytm</button>
<button class="chip-unselected px-4 py-2 rounded-full border text-sm font-medium transition-colors hover:bg-surface-container-low">PhonePe</button>
<button class="chip-unselected px-4 py-2 rounded-full border text-sm font-medium transition-colors hover:bg-surface-container-low">Adobe</button>
<button class="chip-unselected px-4 py-2 rounded-full border text-sm font-medium transition-colors hover:bg-surface-container-low">Goldman Sachs</button>
</div>
<!-- Indicator -->
<p class="font-body-sm text-body-sm text-on-surface-variant mb-10">3 companies selected (max 5)</p>
<!-- Action Button -->
<button class="w-full bg-[#111827] text-white py-3.5 rounded-lg font-ui-medium text-ui-medium transition-colors hover:bg-gray-800 flex items-center justify-center gap-2">
            Continue
            <span class="material-symbols-outlined text-sm" style="font-variation-settings: 'wght' 600;">arrow_forward</span>
</button>
</div>
<script>
        // Simple interaction script for chips to demonstrate UI responsiveness
        document.addEventListener('DOMContentLoaded', () => {
            const chips = document.querySelectorAll('#company-chips button');
            
            chips.forEach(chip => {
                chip.addEventListener('click', function() {
                    if (this.classList.contains('chip-selected')) {
                        this.classList.remove('chip-selected');
                        this.classList.add('chip-unselected');
                    } else {
                        // Count currently selected
                        const selectedCount = document.querySelectorAll('.chip-selected').length;
                        if (selectedCount < 5) {
                            this.classList.remove('chip-unselected');
                            this.classList.add('chip-selected');
                        }
                    }
                });
            });
        });
    </script>
